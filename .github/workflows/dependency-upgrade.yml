name: Dependency Upgrade Bot

on:
  workflow_dispatch:

jobs:

  build-matrix:

    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq -y

      - id: matrix
        run: |
          MATRIX=$(jq -c '
            [
              .dependencies[].repos[]
            ]
            | unique
            | map({repo:.})
            | {include:.}
          ' dependency-versions.json)

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  upgrade:

    needs: build-matrix
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install jq -y

      - name: Configure Git Authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.DOWNSTREAM_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Clone repository
        run: |
          git clone https://github.com/anikgupta1970/${{ matrix.repo }}.git

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}
        run: |

          gh label create dependencies --color 0366d6 --description "Dependency upgrades" --repo anikgupta1970/${{ matrix.repo }} || true
          gh label create automation --color 0e8a16 --description "Automated PR" --repo anikgupta1970/${{ matrix.repo }} || true

      - name: Update dependencies
        run: |

          cd ${{ matrix.repo }}

          CHANGED=false
          TABLE="| Dependency | Property | Version |\n|-----------|-----------|---------|\n"
          CHANGELOG=""

          for dep in $(jq -c '.dependencies[]' $GITHUB_WORKSPACE/dependency-versions.json); do

            NAME=$(echo $dep | jq -r '.name')
            PROP=$(echo $dep | jq -r '.property')
            VER=$(echo $dep | jq -r '.version')

            if echo $dep | jq -r '.repos[]' | grep -q "^${{ matrix.repo }}$"; then

              echo "Updating $PROP → $VER"

              mvn versions:set-property \
                -Dproperty=$PROP \
                -DnewVersion=$VER \
                -DgenerateBackupPoms=false

              TABLE="${TABLE}| ${NAME} | ${PROP} | ${VER} |\n"
              CHANGELOG="${CHANGELOG}- ${NAME} upgraded to ${VER}\n"

              CHANGED=true

            fi

          done

          echo "changed=$CHANGED" >> $GITHUB_ENV

          echo "TABLE<<EOF" >> $GITHUB_ENV
          echo -e "$TABLE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo -e "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Commit changes
        if: env.changed == 'true'
        run: |

          cd ${{ matrix.repo }}

          git checkout -b chore/dependency-upgrade || git checkout chore/dependency-upgrade

          git config user.name "dependency-bot"
          git config user.email "bot@company.com"

          git add .

          git commit -m "chore: automated dependency upgrades" || echo "Nothing to commit"

          git push origin HEAD --force

      - name: Create Pull Request
        if: env.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}
        run: |

          cd ${{ matrix.repo }}

          BODY=$(cat <<EOF

          ## Automated Dependency Upgrade

          This PR was generated automatically.

          ### Updated Dependencies

          ${TABLE}

          ### Changelog

          ${CHANGELOG}

          ---
          🤖 Generated by Dependency Upgrade Bot
          EOF
          )

          gh pr create \
            --title "chore: dependency upgrades" \
            --body "$BODY" \
            --base main \
            --head chore/dependency-upgrade \
            --label dependencies \
            --label automation \
            || echo "PR already exists"
