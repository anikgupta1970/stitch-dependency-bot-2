name: Auto Dependency Upgrade

on:
  workflow_dispatch:
    inputs:
      dependency:
        description: "Dependency name (example: stitch-jbi)"
        required: true
      version:
        description: "Version to upgrade"
        required: true

  repository_dispatch:
    types: [dependency-release]

jobs:

  load-config:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:

      - name: Checkout bot repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq -y

      - id: matrix
        run: |

          DEP=${{ inputs.dependency || github.event.client_payload.dependency }}
          VERSION=${{ inputs.version || github.event.client_payload.version }}

          echo "Dependency: $DEP"
          echo "Version: $VERSION"

          MATRIX=$(jq -c \
            --arg dep "$DEP" \
            --arg version "$VERSION" \
            '
            .dependencies[]
            | select(.name==$dep)
            | . as $d
            | $d.repos[]
            | {repo: ., property: $d.property, version: $version}
            ' dependency-map.json \
            | jq -s '{include:.}')

          echo "Matrix: $MATRIX"

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT


  upgrade:

    needs: load-config
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.load-config.outputs.matrix) }}

    steps:

      - name: Configure Git Authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.DOWNSTREAM_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install gh -y

      - name: Clone repository
        run: |
          git clone https://github.com/anikgupta1970/${{ matrix.repo }}.git
          cd ${{ matrix.repo }}

      - name: Update Maven property
        run: |
          cd ${{ matrix.repo }}

          mvn versions:set-property \
            -Dproperty=${{ matrix.property }} \
            -DnewVersion=${{ matrix.version }} \
            -DgenerateBackupPoms=false

      - name: Commit changes
        run: |
          cd ${{ matrix.repo }}

          git checkout -b chore/upgrade-${{ matrix.property }}-${{ matrix.version }}

          git config user.name "dependency-bot"
          git config user.email "bot@company.com"

          git commit -am "chore: upgrade ${{ matrix.property }} to ${{ matrix.version }}" || echo "No changes to commit"

          git push origin HEAD

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}
        run: |
          cd ${{ matrix.repo }}

          gh pr create \
            --title "Upgrade ${{ matrix.property }} to ${{ matrix.version }}" \
            --body "Automated dependency upgrade by stitch-dependency-bot"
