name: Dependency Upgrade Bot

on:
  workflow_dispatch:

jobs:

  build-matrix:

    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:

      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq -y

      - id: matrix
        run: |

          MATRIX=$(jq -c '
            [
              .dependencies[].repos[]
            ]
            | unique
            | map({repo:.})
            | {include:.}
          ' dependency-versions.json)

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  upgrade:

    needs: build-matrix
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:

      - name: Configure Git Authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.DOWNSTREAM_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Clone repository
        run: |
          git clone https://github.com/anikgupta1970/${{ matrix.repo }}.git

      - name: Update dependencies
        run: |

          cd ${{ matrix.repo }}

          CHANGED=false

          jq -c '.dependencies[]' ../dependency-versions.json | while read dep; do

            PROP=$(echo $dep | jq -r '.property')
            VER=$(echo $dep | jq -r '.version')

            MATCH=$(echo $dep | jq -r '.repos[]' | grep -w "${{ matrix.repo }}" || true)

            if [ ! -z "$MATCH" ]; then

              echo "Updating $PROP to $VER"

              mvn versions:set-property \
                -Dproperty=$PROP \
                -DnewVersion=$VER \
                -DgenerateBackupPoms=false

              CHANGED=true

            fi

          done

          echo "changed=$CHANGED" >> $GITHUB_ENV

      - name: Commit changes
        if: env.changed == 'true'
        run: |

          cd ${{ matrix.repo }}

          git checkout -b chore/upgrade-dependencies || git checkout chore/upgrade-dependencies

          git config user.name "dependency-bot"
          git config user.email "bot@company.com"

          git commit -am "chore: upgrade dependencies" || echo "Nothing to commit"

          git push origin HEAD --force

      - name: Create Pull Request
        if: env.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}
        run: |

          cd ${{ matrix.repo }}

          gh pr create \
            --title "Upgrade dependencies" \
            --body "Automated dependency upgrade" \
            --base main \
            --head chore/upgrade-dependencies || echo "PR already exists"
